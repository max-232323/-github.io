<title>🌍 Länder & Flaggen Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fa;
    text-align:center;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    color:#2c3e50;
}

input{
    padding:10px;
    font-size:16px;
    width:250px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#3498db;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

#flag{
    font-size:120px;
}

.score{
    font-size:22px;
    font-weight:bold;
    color:green;
}

#quizArea{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <div id="startScreen">
        <h1>🌍 Länder & Flaggen Quiz</h1>

        <p>Bitte Namen eingeben:</p>

        <input type="text" id="playerName" placeholder="Dein Name">

        <br><br>

        <button onclick="startGame('land')">
            Länder raten
        </button>

        <button onclick="startGame('flag')">
            Flaggen raten
        </button>
    </div>

    <div id="quizArea">

        <h2 id="welcome"></h2>

        <div class="score">
            Punkte: <span id="score">0</span> / 50
        </div>

        <hr>

        <div id="question"></div>
        <div id="flag"></div>

        <br>

        <input id="answer" type="text" placeholder="Antwort eingeben">

        <br><br>

        <button onclick="checkAnswer()">
            Antwort prüfen
        </button>

        <p id="result"></p>

    </div>

</div>

<script>

let mode = "";
let score = 0;
let currentAnswer = "";

const countries = [

];

const flags = [
{flag:"🇩🇪",country:"Deutschland"},
{flag:"🇫🇷",country:"Frankreich"},
{flag:"🇪🇸",country:"Spanien"},

{flag:"🇷🇸",country:"Serbien"}

function startGame(selectedMode){

    let name =
    document.getElementById("playerName").value.trim();

    if(name === ""){
        alert("Bitte Namen eingeben!");
        return;
    }

    mode = selectedMode;

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quizArea").style.display="block";

    document.getElementById("welcome").innerHTML =
    "Willkommen, <b>" + name + "</b>";

    nextQuestion();
}

function nextQuestion(){

    document.getElementById("answer").value="";
    document.getElementById("result").innerHTML="";

    if(mode==="land"){

        let item =
        countries[Math.floor(Math.random()*countries.length)];

        currentAnswer = item.country;

        document.getElementById("flag").innerHTML="";

        document.getElementById("question").innerHTML =
        "<h3>Welches Land hat die Hauptstadt <b>" +
        item.capital +
        "</b>?</h3>";

    }else{

        let item =
        flags[Math.floor(Math.random()*flags.length)];

        currentAnswer = item.country;

        document.getElementById("question").innerHTML =
        "<h3>Zu welchem Land gehört diese Flagge?</h3>";

        document.getElementById("flag").innerHTML =
        item.flag;
    }
}

function checkAnswer(){

    let answer =
    document.getElementById("answer").value.trim();

    if(answer.toLowerCase() === currentAnswer.toLowerCase()){

        score++;

        document.getElementById("score").innerText =
        score;

        document.getElementById("result").innerHTML =
        "✅ Richtig!";

        if(score >= 50){

            setTimeout(() => {

                alert(
                    "🏆 GEWONNEN!\\n\\n" +
                    "Du hast 50 Punkte erreicht!"
                );

                location.reload();

            },500);

            return;
        }

    }else{

        document.getElementById("result").innerHTML =
        "❌ Falsch! Richtige Antwort: " +
        currentAnswer;
    }

    setTimeout(nextQuestion,1500);
}

</script>

</body>
